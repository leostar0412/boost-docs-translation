# Add new Boost Submodules from boostorg/boost to the per-library GitHub org.
#
# Trigger: repository_dispatch with event_type "add-submodules".
# Example: POST /repos/{owner}/{repo}/dispatches
#   Body: {"event_type": "add-submodules", "client_payload": {"version": "boost-1.90.0"}}
#
# client_payload:
#   version: (optional) Boost release ref (e.g. boost-1.90.0). Used for both library repos and .gitmodules
#     auto-discovery. If omitted: library repos use develop, .gitmodules uses develop.
#   submodules: (optional) List-like string of submodule names (e.g. [algorithm, system]). If set, .gitmodules is not fetched.
#   lang_codes: (optional) Language code for Weblate (e.g. zh_Hans). Defaults to vars.LANG_CODES.
#
# Required secret: SYNC_TOKEN — PAT with repo and org create/push in MODULE_ORG.
#   Repository variable SUBMODULES_ORG: GitHub org for library repos (e.g. CppDigest). If unset, MODULE_ORG is this repo's org.
# Optional: LANG_CODES.

name: Add submodules

on:
  repository_dispatch:
    types: [add-submodules]

jobs:
  add-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Add submodules
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_TOKEN }}
          LIBS_REF: ${{ github.event.client_payload.version || 'develop' }}
          SUBMODULES: ${{ github.event.client_payload.submodules || '' }}
          LANG_CODES: ${{ github.event.client_payload.lang_codes || vars.LANG_CODES }}
          SUBMODULES_ORG: ${{ vars.SUBMODULES_ORG }}
        run: |
          set -euo pipefail

          [[ -z "${GITHUB_TOKEN:-}" ]] && {
            echo "Error: SYNC_TOKEN secret is not set." >&2
            exit 1
          }

          [[ -z "${LANG_CODES:-}" ]] && {
            echo "Error: lang_codes not set in client_payload or vars.LANG_CODES." >&2
            exit 1
          }

          UPDATES=()
          # Summary buckets (doc metadata / skips); printed after Step 2.
          META_MISSING=()
          NO_DOC_PATHS=()
          REPO_EXISTS_SKIP=()

          WORK_DIR=$(mktemp -d)
          trap 'rm -rf "$WORK_DIR"' EXIT
          BOOST_WORK="$WORK_DIR/boost"
          TRANS_DIR="$WORK_DIR/translations"
          mkdir -p "$BOOST_WORK"

          # Configure git credential helper so all github.com pushes are authenticated
          # without embedding tokens in remote URLs.
          gh auth setup-git

          # shellcheck source=assets/env.sh
          source "$GITHUB_WORKSPACE/.github/workflows/assets/env.sh"
          # shellcheck source=assets/lib.sh
          source "$GITHUB_WORKSPACE/.github/workflows/assets/lib.sh"

          # ── Organization repo helpers ────────────────────────────────────────

          create_repo() {
            gh repo create "$1/$2" --public > /dev/null \
              || { echo "Create repo $1/$2 failed" >&2; return 1; }
          }

          set_default_branch() {
            gh api --method PATCH "repos/$1/$2" -f "default_branch=$3" \
              || { echo "Error: set default branch to $3 failed for $1/$2." >&2; return 1; }
          }

          create_new_repo_and_push() {
            local org="$1" sub_name="$2" sub_clone="$3" repo_url="$4" libs_ref="$5"
            create_repo "$org" "$sub_name" || return 2
            git -C "$sub_clone" init || return 2
            set_git_bot_config "$sub_clone"
            git -C "$sub_clone" add -A || return 2
            git -C "$sub_clone" commit -m "Create the original documentation of $libs_ref" || return 2
            git -C "$sub_clone" branch -M "$MASTER_BRANCH" || return 2
            git -C "$sub_clone" remote remove origin 2>/dev/null || true
            git -C "$sub_clone" remote add origin "$repo_url" || return 2
            git -C "$sub_clone" push -u origin "$MASTER_BRANCH" || return 2
            git -C "$sub_clone" push origin "$MASTER_BRANCH" || return 2
            for lang_code in "${lang_codes_arr[@]}"; do
              local local_br="local-${lang_code}"
              git -C "$sub_clone" checkout -B "$local_br" "$MASTER_BRANCH" || return 2
              add_create_tag_workflow "$sub_clone" || return 2
              git -C "$sub_clone" push -u origin "$local_br" || return 2
            done
            set_default_branch "$org" "$sub_name" "$MASTER_BRANCH" || return 2
          }

          # ── Per-submodule processing ──────────────────────────────────────────

          process_one_submodule() {
            local sub_name="$1" doc_paths

            if repo_exists "$MODULE_ORG" "$sub_name"; then
              REPO_EXISTS_SKIP+=("$sub_name")
              echo "  Skipping: $MODULE_ORG/$sub_name already exists." >&2; return 1
            fi

            doc_paths=$(get_doc_paths "$sub_name" "$LIBS_REF") || {
              META_MISSING+=("$sub_name")
              echo "  No libraries.json." >&2; return 2
            }
            [[ -z "$doc_paths" ]] && {
              NO_DOC_PATHS+=("$sub_name")
              echo "  No doc paths in metadata, skipping." >&2; return 1
            }

            local sub_clone="$BOOST_WORK/$sub_name"
            clone_repo "https://github.com/${BOOST_ORG}/${sub_name}.git" \
              "$LIBS_REF" "$sub_clone" || { echo "  Clone failed." >&2; return 2; }

            local -a paths_arr
            mapfile -t paths_arr <<< "$doc_paths"
            prune_to_doc_only "$sub_clone" "${paths_arr[@]}"

            local org_repo_url="https://github.com/${MODULE_ORG}/${sub_name}.git"
            create_new_repo_and_push "$MODULE_ORG" "$sub_name" "$sub_clone" "$org_repo_url" "$LIBS_REF"
          }

          # ── Main ─────────────────────────────────────────────────────────────

          mapfile -t lang_codes_arr < <(parse_list "$LANG_CODES")
          [[ ${#lang_codes_arr[@]} -eq 0 ]] && {
            echo "Error: LANG_CODES parsed to empty list." >&2; exit 1
          }
          echo "Lang codes: ${lang_codes_arr[*]}" >&2

          # ── Step 1: ensure TRANSLATIONS_REPO has local-{lang_code} branches ──

          ensure_translations_cloned "$ORG" "$TRANSLATIONS_REPO" "$TRANS_DIR"
          for lang_code in "${lang_codes_arr[@]}"; do
            ensure_local_branch_in_translations "$TRANS_DIR" "$lang_code"
          done

          # ── Step 2: process submodules ────────────────────────────────────────

          if [[ -n "${SUBMODULES:-}" ]]; then
            mapfile -t submodule_names < <(parse_list "$SUBMODULES")
            echo "Using ${#submodule_names[@]} submodules from input." >&2
          else
            # Fetch .gitmodules from boostorg/boost at LIBS_REF to discover all libs/ submodules.
            echo "Fetching .gitmodules from boostorg/boost at $LIBS_REF..." >&2
            gitmodules_content=$(gh api \
              "repos/boostorg/boost/contents/.gitmodules?ref=$LIBS_REF" \
              -H "Accept: application/vnd.github.v3.raw" 2>/dev/null) || {
              echo "Failed to fetch .gitmodules" >&2; exit 1
            }
            mapfile -t submodule_names < <(
              echo "$gitmodules_content" \
                | grep '^\s*path\s*=' \
                | sed 's/.*=\s*//' \
                | { grep '^libs/' || true; } \
                | sed 's|^libs/||'
            )
            echo "Found ${#submodule_names[@]} libs submodules." >&2
          fi

          [[ ${#submodule_names[@]} -eq 0 ]] && {
            echo "No submodules to process, nothing to do." >&2; exit 0
          }

          total=${#submodule_names[@]}
          submodule_fatal=0
          for i in "${!submodule_names[@]}"; do
            sub="${submodule_names[$i]}"
            echo "[$(( i + 1 ))/$total] $sub ..." >&2
            if process_one_submodule "$sub"; then
              UPDATES+=("$sub")
            else
              rc=$?
              [[ $rc -eq 2 ]] && submodule_fatal=$((submodule_fatal + 1))
            fi
          done

          echo "── Summary: Boost library documentation metadata ──" >&2
          echo "  Type 1 — Missing or unreadable meta/libraries.json (${#META_MISSING[@]}): $([[ ${#META_MISSING[@]} -eq 0 ]] && echo '(none)' || echo "${META_MISSING[*]}")" >&2
          echo "  Type 2 — No doc paths in meta/libraries.json (${#NO_DOC_PATHS[@]}): $([[ ${#NO_DOC_PATHS[@]} -eq 0 ]] && echo '(none)' || echo "${NO_DOC_PATHS[*]}")" >&2
          echo "  Type 3 — Target org repo already exists, skipped (${#REPO_EXISTS_SKIP[@]}): $([[ ${#REPO_EXISTS_SKIP[@]} -eq 0 ]] && echo '(none)' || echo "${REPO_EXISTS_SKIP[*]}")" >&2

          [[ $submodule_fatal -gt 0 ]] && {
            echo "Error: $submodule_fatal submodule(s) failed with errors." >&2
            exit 1
          }

          finalize_translations_repo "$TRANS_DIR" "$LIBS_REF"

          echo "Done." >&2
